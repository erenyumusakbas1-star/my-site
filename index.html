<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>my-site</title>
  <style>
    :root { color-scheme: light dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 30%, #1b2735 0%, #090a0f 100%);
      color: #f5f7fa;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #6ee7f9, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p { margin-top: 1rem; opacity: 0.7; font-size: 1.1rem; }
  </style>
</head>
<body>
  <main>
    <h1>Hello, world 👋</h1>
    <p>This page is live on GitHub Pages.</p>
  </main>
</body>
</html>
